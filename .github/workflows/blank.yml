name: Build GuardScan APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Write project files
        run: |
          mkdir -p app/src/main/java/com/civicguard/guardscan
          mkdir -p app/src/main/res/layout

          echo '' | base64 -d > settings.gradle
          echo 'cGx1Z2lucyB7CiAgICBpZCgiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iKSB2ZXJzaW9uICI4LjIuMiIgYXBwbHkgZmFsc2UKICAgIGlkKCJvcmcuamV0YnJhaW5zLmtvdGxpbi5hbmRyb2lkIikgdmVyc2lvbiAiMS45LjIyIiBhcHBseSBmYWxzZQp9Cg==' | base64 -d > build.gradle
          echo 'YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmtvdGxpbi5jb2RlLnN0eWxlPW9mZmljaWFsCmFuZHJvaWQubm9uVHJhbnNpdGl2ZVJDbGFzcz10cnVlCg==' | base64 -d > gradle.properties
          echo '' | base64 -d > app/build.gradle
          echo '' | base64 -d > app/src/main/AndroidManifest.xml
          echo '' | base64 -d > app/src/main/res/layout/activity_main.xml
          echo '' | base64 -d > app/src/main/java/com/civicguard/guardscan/MainActivity.kt

      - name: Point Gradle at the Android SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Assemble
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuardScan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
